  .prompt-multi-box { background: var(--code-bg); color: var(--code-text); border-radius: 0 10px 10px 10px; padding: 16px 18px; font-family: "SF Mono", Consolas, "Hiragino Kaku Gothic ProN", monospace; font-size: 13px; margin-bottom: 12px; position: relative; line-height: 1.55; max-height: 280px; overflow: auto; }

ファイルへの直接リンクも付けて。`,

function escapeHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function multiPrompt(key) {
  const prompts = PROF_PROMPTS[key] || {};
  let html = '<div class="prompt-multi"><div class="prof-tabs">';
  PROFESSIONS.forEach((p, i) => {
    html += `<button class="prof-tab${i===0?' active':''}" data-prof="${p.key}" onclick="switchProf(this)">${p.label}</button>`;
  });
  html += '</div><div class="prompt-multi-box"><button class="copy-btn" onclick="copyMulti(this)">コピー</button>';
  PROFESSIONS.forEach((p, i) => {
    const text = prompts[p.key] || '（このプロンプトは準備中）';
    html += `<div class="prompt-content${i===0?' active':''}" data-prof="${p.key}">${escapeHTML(text)}</div>`;
  });
  html += '</div></div>';
  return html;
}

function switchProf(btn) {
  const prof = btn.dataset.prof;
  const tabs = btn.parentElement;
  const multi = tabs.parentElement;
  tabs.querySelectorAll('.prof-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  multi.querySelectorAll('.prompt-content').forEach(c => c.classList.toggle('active', c.dataset.prof === prof));
}

function copyMulti(btn) {
  const box = btn.parentElement;
  const active = box.querySelector('.prompt-content.active');
  const text = active.innerText.trim();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    btn.textContent = '✓ コピー済'; btn.classList.add('copied');
    setTimeout(() => { toast.classList.remove('show'); btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1600);
  });
}

let currentSlide = 0;
const stage = document.getElementById('stage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const slideInfo = document.getElementById('slideInfo');
const progressBar = document.getElementById('progressBar');

slides.forEach((slide) => {
  const div = document.createElement('div');
  div.className = 'slide' + (slide.type === 'title' ? ' title-slide' : '');
  div.innerHTML = slide.html;
  stage.appendChild(div);
});

function showSlide(i) {
  if (i < 0 || i >= slides.length) return;
  document.querySelectorAll('.card.collapsed').forEach(c => c.classList.remove('collapsed'));
  document.querySelectorAll('.has-collapsed').forEach(g => g.classList.remove('has-collapsed'));
  document.querySelectorAll('.restore-hint.show').forEach(h => h.classList.remove('show'));
  currentSlide = i;
  document.querySelectorAll('.slide').forEach((el, idx) => el.classList.toggle('active', idx === i));
  slideInfo.textContent = `${i + 1} / ${slides.length}`;
  progressBar.style.width = `${((i + 1) / slides.length) * 100}%`;
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === slides.length - 1;
}
prevBtn.onclick = () => showSlide(currentSlide - 1);
nextBtn.onclick = () => showSlide(currentSlide + 1);
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { showSlide(currentSlide + 1); e.preventDefault(); }
  if (e.key === 'ArrowLeft') showSlide(currentSlide - 1);
});
function copyPrompt(id, btn) {
  const box = document.getElementById(id);
  const text = box.innerText.replace(/^コピー\s*/, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    btn.textContent = '✓ コピー済'; btn.classList.add('copied');
    setTimeout(() => { toast.classList.remove('show'); btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1600);
  });
}
showSlide(0);

function initChecklists() {
  const dayKey = (location.pathname.split('/').pop() || 'day').replace('.html', '') || 'day';
  const allSlides = Array.from(document.querySelectorAll('.slide'));
  document.querySelectorAll('.checklist li').forEach((li) => {
    const slideEl = li.closest('.slide');
    const slideIdx = allSlides.indexOf(slideEl);
    const itemIdx = Array.from(li.parentElement.children).indexOf(li);
    const key = 'chk-' + dayKey + '-s' + slideIdx + '-i' + itemIdx;
    try { if (localStorage.getItem(key) === '1') li.classList.add('checked'); } catch (e) {}
    li.addEventListener('click', () => {
      li.classList.toggle('checked');
      try { localStorage.setItem(key, li.classList.contains('checked') ? '1' : '0'); } catch (e) {}
    });
  });
}
initChecklists();
initCardClosers();

function initCardClosers() {
  document.querySelectorAll('.grid-2 > .card, .grid-3 > .card').forEach(card => {
    if (card.querySelector('.card-close')) return;
    const btn = document.createElement('button');
    btn.className = 'card-close';
    btn.innerHTML = '×';
    btn.title = '閉じる（次のスライドに移動すると元に戻る）';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      card.classList.add('collapsed');
      const grid = card.parentElement;
      grid.classList.add('has-collapsed');
      let hint = grid.parentElement.querySelector(':scope > .restore-hint');
      if (!hint) {
        hint = document.createElement('span');
        hint.className = 'restore-hint';
        hint.textContent = '↩ 閉じたカードを元に戻す';
        hint.addEventListener('click', () => {
          grid.querySelectorAll('.card.collapsed').forEach(c => c.classList.remove('collapsed'));
          grid.classList.remove('has-collapsed');
          hint.classList.remove('show');
        });
        grid.parentElement.insertBefore(hint, grid.nextSibling);
      }
      hint.classList.add('show');
    });
    card.appendChild(btn);
  });
}
</script>
